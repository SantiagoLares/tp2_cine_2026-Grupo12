<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <div class="header-logo">
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </div>
      <div>
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="./estrenos.html">Próximos estrenos</a>
          <a href="../index.html">Volver</a>
        </nav>
      </div>
    </header>

    <main class="login-main">
      <form class="login-form" action="perfil.html">
        <h2>Acceso Clientes</h2>

        <div class="form-grupo">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tucorreo@email.com" required />
        </div>

        <div class="form-grupo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-login">Ingresar</button>

        <p class="login-registro">¿No eres miembro? <a href="registro.html">Regístrate</a></p>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
